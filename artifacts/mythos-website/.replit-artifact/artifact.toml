kind = "web"
previewPath = "/"
title = "Mythos AI Security"
version = "1.0.0"
id = "artifacts/mythos-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18497

[services.development]
run = "pnpm --filter @workspace/mythos-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mythos-website", "run", "build" ]
publicDir = "artifacts/mythos-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18497"
BASE_PATH = "/"
